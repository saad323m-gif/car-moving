<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>إدارة أسطول المسعود</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; user-select: none; -webkit-tap-highlight-color: transparent; }
        .accordion-content { max-height: 0; overflow: hidden; transition: all 0.3s ease-out; }
        .accordion-content.open { max-height: 2000px; padding: 1rem; }
        .btn-action { @apply flex items-center justify-center gap-2 px-6 py-4 rounded-xl text-lg font-bold transition-transform active:scale-95 shadow-md; }
        .safe-bottom { padding-bottom: calc(env(safe-area-inset-bottom) + 5rem); }
        .role-tag { @apply text-xs px-2 py-1 rounded-full font-bold; }
        .developer { color: #ef4444; background: #fee2e2; }
        .manager { color: #f97316; background: #ffedd5; }
        .supervisor { color: #1e3a8a; background: #dbeafe; }
        .member { color: #10b981; background: #d1fae5; }
        #loading-overlay { background: white; z-index: 9999; transition: opacity 0.5s; }
        .edit-badge { background: #fffbeb; border: 1px solid #fef3c7; color: #92400e; padding: 8px; border-radius: 8px; font-size: 0.8rem; margin-top: 8px; }
    </style>
</head>
<body class="safe-bottom">

<div id="loading-overlay" class="fixed inset-0 flex flex-col items-center justify-center">
    <img src="logo.png" class="w-32 mb-4 animate-pulse">
    <div class="w-12 h-12 border-4 border-blue-900 border-t-transparent rounded-full animate-spin"></div>
</div>

<div id="app" class="hidden">
    <header class="bg-white sticky top-0 z-40 px-4 py-3 shadow-sm flex justify-between items-center border-b border-gray-100">
        <div class="flex items-center gap-3">
            <img src="logo.png" class="h-10" alt="Logo">
            <div>
                <h1 id="user-display-name" class="font-bold text-sm leading-tight text-gray-800"></h1>
                <span id="user-display-role" class="role-tag"></span>
            </div>
        </div>
        <div class="flex gap-3">
            <button onclick="location.reload()" class="p-2 text-blue-900 bg-blue-50 rounded-full w-10 h-10"><i class="fas fa-sync-alt"></i></button>
            <button onclick="handleLogout()" class="p-2 text-red-500 bg-red-50 rounded-full w-10 h-10"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>

    <div class="p-4">
        <div class="relative group">
            <input type="text" id="globalSearch" oninput="runSearch()" placeholder="بحث شامل في النظام..." 
                   class="w-full p-4 pr-12 rounded-2xl border-2 border-transparent bg-white shadow-md focus:border-blue-900 outline-none transition-all">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
        </div>
    </div>

    <main id="view-container" class="px-4 space-y-4"></main>

    <div id="stats-container" class="px-4 mt-6 hidden">
        <div class="bg-blue-900 rounded-3xl p-6 text-white shadow-xl">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fas fa-chart-pie"></i> إحصائيات النظام</h2>
            <div class="grid grid-cols-2 gap-4" id="stats-grid"></div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-gray-100 flex justify-around p-2 pb-6 z-50">
        <button onclick="renderTab('movements')" class="nav-btn flex flex-col items-center p-2 text-gray-400" id="btn-movements">
            <i class="fas fa-exchange-alt text-xl"></i><span class="text-[10px] mt-1">التحركات</span>
        </button>
        <button onclick="renderTab('custody')" class="nav-btn flex flex-col items-center p-2 text-gray-400" id="btn-custody">
            <i class="fas fa-box-open text-xl"></i><span class="text-[10px] mt-1">العهدة</span>
        </button>
        <button onclick="renderTab('fleet')" class="nav-btn flex flex-col items-center p-2 text-gray-400 hidden" id="btn-fleet">
            <i class="fas fa-car text-xl"></i><span class="text-[10px] mt-1">الأسطول</span>
        </button>
        <button onclick="renderTab('users')" class="nav-btn flex flex-col items-center p-2 text-gray-400" id="btn-users">
            <i class="fas fa-users text-xl"></i><span class="text-[10px] mt-1">الأعضاء</span>
        </button>
    </nav>
</div>

<div id="login-screen" class="fixed inset-0 bg-slate-50 z-[100] flex items-center justify-center p-6 hidden">
    <div class="w-full max-w-sm space-y-8">
        <div class="text-center">
            <img src="logo.png" class="h-20 mx-auto mb-6">
            <h2 class="text-3xl font-bold text-blue-900">مرحباً بك</h2>
            <p class="text-gray-500 mt-2">سجل دخولك لإدارة المحتوى</p>
        </div>
        <div class="space-y-4">
            <input type="text" id="login-user" placeholder="اسم المستخدم" class="w-full p-4 rounded-2xl border-2 focus:border-blue-900 outline-none shadow-sm">
            <input type="password" id="login-pass" placeholder="كلمة المرور" class="w-full p-4 rounded-2xl border-2 focus:border-blue-900 outline-none shadow-sm">
            <button onclick="processLogin()" class="w-full bg-blue-900 text-white p-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-transform">دخول النظام</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, onSnapshot, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD-qlIfpFyam5UgjxzhwAEhkttIQCBZXUw",
        authDomain: "carmanagement-79bfb.firebaseapp.com",
        projectId: "carmanagement-79bfb",
        storageBucket: "carmanagement-79bfb.firebasestorage.app",
        messagingSenderId: "313516916430",
        appId: "1:313516916430:web:6f2c20740bced9e7211a9f"
    };

    const fb = initializeApp(firebaseConfig);
    const db = getFirestore(fb);

    // --- State Management ---
    let user = JSON.parse(localStorage.getItem('car_app_user'));
    let activeTab = 'movements';
    let usersCache = [];

    window.onload = () => {
        setTimeout(() => {
            document.getElementById('loading-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('loading-overlay').remove(), 500);
            if (user) initApp();
            else document.getElementById('login-screen').classList.remove('hidden');
        }, 1500);
    };

    // --- Core Logic ---
    function initApp() {
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('user-display-name').innerText = user.name;
        const roleEl = document.getElementById('user-display-role');
        roleEl.innerText = getRoleLabel(user.role);
        roleEl.className = `role-tag ${user.role}`;

        if (['developer', 'manager', 'supervisor'].includes(user.role)) {
            document.getElementById('btn-fleet').classList.remove('hidden');
            document.getElementById('stats-container').classList.remove('hidden');
        }
        
        loadUsers();
        renderTab('movements');
        updateStats();
    }

    async function loadUsers() {
        onSnapshot(collection(db, "users"), (snap) => {
            usersCache = snap.docs.map(d => ({id: d.id, ...d.data()}));
            if(activeTab === 'users') renderUsers();
        });
    }

    window.renderTab = (tab) => {
        activeTab = tab;
        const container = document.getElementById('view-container');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('text-blue-900', 'text-gray-400'));
        document.getElementById(`btn-${tab}`).classList.replace('text-gray-400', 'text-blue-900');
        
        switch(tab) {
            case 'movements': renderMovements(); break;
            case 'custody': renderCustody(); break;
            case 'fleet': renderFleet(); break;
            case 'users': renderUsers(); break;
        }
    };

    // --- Tab: Movements ---
    function renderMovements() {
        const container = document.getElementById('view-container');
        container.innerHTML = `
            <div class="bg-white rounded-3xl p-6 shadow-sm space-y-4">
                <h3 class="font-bold text-lg text-blue-900 border-r-4 border-blue-900 pr-3">إضافة حركة</h3>
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="m-car" placeholder="رقم السيارة" class="p-3 bg-gray-50 rounded-xl outline-none">
                    <input type="text" id="m-plate" placeholder="كود اللوحة" class="p-3 bg-gray-50 rounded-xl outline-none">
                </div>
                <input type="text" id="m-type" placeholder="نوع السيارة" class="w-full p-3 bg-gray-50 rounded-xl outline-none">
                <select id="m-driver" class="w-full p-3 bg-gray-50 rounded-xl outline-none">
                    ${generateUserSelect()}
                </select>
                <div class="flex gap-2">
                    <button onclick="setMoveType('استلام')" id="btn-in" class="flex-1 p-3 rounded-xl border-2 border-green-500 font-bold text-green-600">استلام</button>
                    <button onclick="setMoveType('تسليم')" id="btn-out" class="flex-1 p-3 rounded-xl border-2 border-blue-500 font-bold text-blue-600">تسليم</button>
                </div>
                <textarea id="m-notes" placeholder="ملاحظات..." class="w-full p-3 bg-gray-50 rounded-xl h-20 outline-none"></textarea>
                <button onclick="saveMovement()" class="w-full bg-blue-900 text-white p-4 rounded-2xl font-bold">حفظ الحركة</button>
            </div>
            <div id="movements-list" class="space-y-3 mt-4"></div>
        `;
        let moveType = 'استلام';
        window.setMoveType = (t) => {
            moveType = t;
            document.getElementById('btn-in').className = t === 'استلام' ? 'flex-1 p-3 rounded-xl bg-green-500 text-white font-bold' : 'flex-1 p-3 rounded-xl border-2 border-green-500 text-green-600';
            document.getElementById('btn-out').className = t === 'تسليم' ? 'flex-1 p-3 rounded-xl bg-blue-500 text-white font-bold' : 'flex-1 p-3 rounded-xl border-2 border-blue-500 text-blue-600';
        };
        setMoveType('استلام');

        window.saveMovement = async () => {
            const data = {
                car: document.getElementById('m-car').value,
                plate: document.getElementById('m-plate').value,
                type: document.getElementById('m-type').value,
                driver: document.getElementById('m-driver').value,
                action: moveType,
                notes: document.getElementById('m-notes').value,
                time: getFormattedTime(),
                timestamp: Date.now(),
                createdBy: user.username,
                createdByName: user.name,
                edited: false
            };
            await addDoc(collection(db, "movements"), data);
            renderTab('movements');
        };

        const q = query(collection(db, "movements"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('movements-list');
            if(!list) return;
            list.innerHTML = '';
            snap.forEach(d => {
                const item = d.data();
                if(user.role === 'member' && item.driver !== user.name) return;
                list.innerHTML += renderMovementCard(d.id, item);
            });
        });
    }

    function renderMovementCard(id, data) {
        const canEdit = canUserEdit(data);
        return `
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div onclick="toggleAccordion('${id}')" class="p-4 flex justify-between items-center bg-gray-50/50">
                    <div>
                        <p class="font-bold text-blue-900">${data.driver}</p>
                        <p class="text-xs text-gray-500">${data.car} - ${data.action}</p>
                    </div>
                    <i class="fas fa-chevron-down text-gray-300"></i>
                </div>
                <div id="content-${id}" class="accordion-content">
                    <div class="grid grid-cols-2 gap-2 text-sm">
                        <p><span class="text-gray-400">اللوحة:</span> ${data.plate}</p>
                        <p><span class="text-gray-400">النوع:</span> ${data.type}</p>
                        <p class="col-span-2 text-blue-600 font-bold"><i class="far fa-clock ml-1"></i> ${data.time}</p>
                    </div>
                    <div class="mt-2 p-2 bg-slate-50 rounded-lg italic text-gray-600 text-sm">"${data.notes || 'لا يوجد ملاحظات'}"</div>
                    ${data.edited ? `<div class="edit-badge">تم التعديل بواسطة: ${data.editedBy}<br>النص الأصلي: ${data.originalText}</div>` : ''}
                    
                    <div class="grid grid-cols-2 gap-2 mt-4">
                        <button onclick="shareItem('${data.car}', '${data.driver}')" class="btn-action bg-blue-50 text-blue-900"><i class="fas fa-share"></i> مشاركة</button>
                        <button onclick="printItem('${id}')" class="btn-action bg-gray-50 text-gray-800"><i class="fas fa-print"></i> طباعة</button>
                        ${canEdit ? `<button onclick="editItem('movements', '${id}', '${data.notes}')" class="btn-action bg-orange-50 text-orange-600"><i class="fas fa-edit"></i> تعديل</button>` : ''}
                        ${['developer','manager','supervisor'].includes(user.role) ? `<button onclick="deleteItem('movements', '${id}')" class="btn-action bg-red-50 text-red-600"><i class="fas fa-trash"></i> حذف</button>` : ''}
                    </div>
                </div>
            </div>
        `;
    }

    // --- Tab: Fleet ---
    function renderFleet() {
        const container = document.getElementById('view-container');
        container.innerHTML = `
            <div class="bg-white rounded-3xl p-6 shadow-sm space-y-4">
                <h3 class="font-bold text-lg text-blue-900 border-r-4 border-blue-900 pr-3">إضافة مركبة للأسطول</h3>
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="f-car" placeholder="رقم السيارة" class="p-3 bg-gray-50 rounded-xl outline-none">
                    <input type="text" id="f-plate" placeholder="كود اللوحة" class="p-3 bg-gray-50 rounded-xl outline-none">
                </div>
                <input type="text" id="f-owner" placeholder="المالك" class="w-full p-3 bg-gray-50 rounded-xl outline-none">
                <input type="text" id="f-type" placeholder="نوع السيارة" class="w-full p-3 bg-gray-50 rounded-xl outline-none">
                <select id="f-driver" class="w-full p-3 bg-gray-50 rounded-xl outline-none">
                    <option value="">اختر المتعهد (اختياري)</option>
                    ${generateUserSelect()}
                </select>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="text-[10px] text-gray-400 block mr-2">نهاية الترخيص</label><input type="date" id="f-lic" class="w-full p-3 bg-gray-50 rounded-xl outline-none"></div>
                    <div><label class="text-[10px] text-gray-400 block mr-2">نهاية التأمين</label><input type="date" id="f-ins" class="w-full p-3 bg-gray-50 rounded-xl outline-none"></div>
                </div>
                <button onclick="saveFleet()" class="w-full bg-blue-900 text-white p-4 rounded-2xl font-bold">إضافة للأطول</button>
            </div>
            <div id="fleet-list" class="space-y-3 mt-4"></div>
        `;

        window.saveFleet = async () => {
            const data = {
                car: document.getElementById('f-car').value,
                plate: document.getElementById('f-plate').value,
                owner: document.getElementById('f-owner').value,
                type: document.getElementById('f-type').value,
                driver: document.getElementById('f-driver').value,
                licDate: document.getElementById('f-lic').value,
                insDate: document.getElementById('f-ins').value,
                timestamp: Date.now()
            };
            await addDoc(collection(db, "fleet"), data);
            renderTab('fleet');
        };

        onSnapshot(collection(db, "fleet"), (snap) => {
            const list = document.getElementById('fleet-list');
            if(!list) return;
            list.innerHTML = '';
            snap.forEach(d => {
                const item = d.data();
                const licExp = checkAlert(item.licDate);
                const insExp = checkAlert(item.insDate);
                list.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-sm border ${licExp || insExp ? 'border-red-300 animate-pulse' : 'border-gray-100'} overflow-hidden">
                        <div onclick="toggleAccordion('${d.id}')" class="p-4 flex justify-between items-center bg-gray-50/50">
                            <span class="font-bold text-blue-900">${item.car} - ${item.type}</span>
                            <i class="fas fa-chevron-down text-gray-300"></i>
                        </div>
                        <div id="content-${d.id}" class="accordion-content">
                            <p class="text-sm mb-1"><span class="text-gray-400">المالك:</span> ${item.owner}</p>
                            <p class="text-sm mb-3"><span class="text-gray-400">المتعهد:</span> ${item.driver || 'غير محدد'}</p>
                            <div class="space-y-2">
                                <div class="p-2 rounded-lg ${licExp ? 'bg-red-50 text-red-600' : 'bg-gray-50'} text-xs font-bold">نهاية الترخيص: ${item.licDate}</div>
                                <div class="p-2 rounded-lg ${insExp ? 'bg-red-50 text-red-600' : 'bg-gray-50'} text-xs font-bold">نهاية التأمين: ${item.insDate}</div>
                            </div>
                            <div class="grid grid-cols-2 gap-2 mt-4">
                                <button onclick="deleteItem('fleet', '${d.id}')" class="btn-action bg-red-50 text-red-600 col-span-2"><i class="fas fa-trash"></i> حذف المركبة</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        });
    }

    // --- Tab: Users ---
    function renderUsers() {
        const container = document.getElementById('view-container');
        container.innerHTML = `
            ${['developer', 'manager', 'supervisor'].includes(user.role) ? `
            <div class="bg-white rounded-3xl p-6 shadow-sm space-y-4">
                <h3 class="font-bold text-lg text-blue-900 border-r-4 border-blue-900 pr-3">إضافة عضو</h3>
                <input type="text" id="u-name" placeholder="اسم العضو" class="w-full p-3 bg-gray-50 rounded-xl outline-none">
                <input type="text" id="u-user" placeholder="اسم المستخدم" class="w-full p-3 bg-gray-50 rounded-xl outline-none">
                <input type="password" id="u-pass" placeholder="كلمة المرور" class="w-full p-3 bg-gray-50 rounded-xl outline-none">
                <input type="tel" id="u-phone" placeholder="رقم الموبايل" class="w-full p-3 bg-gray-50 rounded-xl outline-none">
                <select id="u-role" class="w-full p-3 bg-gray-50 rounded-xl outline-none">
                    <option value="member">عضو</option>
                    <option value="supervisor">مشرف</option>
                    <option value="manager">مدير</option>
                </select>
                <button onclick="saveUser()" class="w-full bg-blue-900 text-white p-4 rounded-2xl font-bold">تأكيد الحساب</button>
            </div>` : ''}
            <div id="users-list" class="space-y-2 mt-4"></div>
        `;

        window.saveUser = async () => {
            const data = {
                name: document.getElementById('u-name').value,
                username: document.getElementById('u-user').value,
                password: document.getElementById('u-pass').value,
                phone: document.getElementById('u-phone').value,
                role: document.getElementById('u-role').value
            };
            if(data.username.length < 4 || data.password.length < 6) return alert("البيانات ضعيفة!");
            await addDoc(collection(db, "users"), data);
            renderTab('users');
        };

        const list = document.getElementById('users-list');
        usersCache.forEach(u => {
            list.innerHTML += `
                <div class="bg-white p-4 rounded-2xl shadow-sm border-r-8 flex justify-between items-center ${u.role === 'developer' ? 'border-red-500' : u.role === 'manager' ? 'border-orange-500' : u.role === 'supervisor' ? 'border-blue-900' : 'border-green-500'}">
                    <div>
                        <p class="font-bold">${u.name}</p>
                        <p class="text-xs text-gray-400">${u.phone} | <span class="role-tag ${u.role}">${getRoleLabel(u.role)}</span></p>
                    </div>
                    <a href="tel:${u.phone}" class="w-10 h-10 bg-gray-50 rounded-full flex items-center justify-center text-blue-900 shadow-inner"><i class="fas fa-phone"></i></a>
                </div>
            `;
        });
    }

    // --- Helpers & Utilities ---
    window.toggleAccordion = (id) => {
        document.getElementById(`content-${id}`).classList.toggle('open');
    };

    window.getFormattedTime = () => {
        return new Intl.DateTimeFormat('en-US', {
            timeZone: 'Asia/Dubai',
            hour12: true,
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            year: 'numeric',
            month: '2-digit',
            day: '2-digit'
        }).format(new Date());
    };

    window.getRoleLabel = (r) => {
        const labels = {developer: 'مطور النظام', manager: 'مدير', supervisor: 'مشرف', member: 'عضو'};
        return labels[r] || r;
    };

    function generateUserSelect() {
        return usersCache.map(u => `<option value="${u.name}" ${u.username === user.username ? 'selected' : ''}>${u.name}</option>`).join('');
    }

    window.canUserEdit = (data) => {
        if(['developer','manager','supervisor'].includes(user.role)) return true;
        const hourDiff = (Date.now() - data.timestamp) / (1000 * 60 * 60);
        return data.createdBy === user.username && hourDiff < 24;
    };

    window.editItem = async (col, id, oldNotes) => {
        const newNotes = prompt("أدخل التعديل الجديد للملاحظات:", oldNotes);
        if(newNotes !== null) {
            await updateDoc(doc(db, col, id), {
                notes: newNotes,
                edited: true,
                editedBy: user.name,
                originalText: oldNotes || 'فارغ'
            });
            alert("تم التعديل بنجاح");
        }
    };

    window.deleteItem = async (col, id) => {
        if(confirm("هل أنت متأكد من الحذف النهائي؟")) {
            await deleteDoc(doc(db, col, id));
            alert("تم الحذف");
        }
    };

    window.checkAlert = (dateStr) => {
        if(!dateStr) return false;
        const diff = (new Date(dateStr) - new Date()) / (1000 * 60 * 60 * 24);
        return diff <= 15;
    };

    window.updateStats = async () => {
        const grid = document.getElementById('stats-grid');
        const fleetSnap = await getDocs(collection(db, "fleet"));
        const moveSnap = await getDocs(collection(db, "movements"));
        const usersSnap = await getDocs(collection(db, "users"));
        
        const stats = [
            { label: 'إجمالي السيارات', val: fleetSnap.size, icon: 'car' },
            { label: 'حركات اليوم', val: moveSnap.size, icon: 'exchange-alt' },
            { label: 'عدد الأعضاء', val: usersSnap.size, icon: 'users' },
            { label: 'العهدة النشطة', val: fleetSnap.docs.filter(d => d.data().driver).length, icon: 'box' }
        ];
        
        grid.innerHTML = stats.map(s => `
            <div class="bg-white/10 p-4 rounded-2xl backdrop-blur-sm border border-white/5">
                <i class="fas fa-${s.icon} text-blue-300 text-xl mb-2"></i>
                <p class="text-2xl font-black">${s.val}</p>
                <p class="text-[10px] opacity-70">${s.label}</p>
            </div>
        `).join('');
    };

    window.runSearch = () => {
        const q = document.getElementById('globalSearch').value.toLowerCase();
        document.querySelectorAll('.bg-white.rounded-2xl').forEach(card => {
            card.innerText.toLowerCase().includes(q) ? card.style.display = 'block' : card.style.display = 'none';
        });
    };

    window.processLogin = () => {
        const u = document.getElementById('login-user').value;
        const p = document.getElementById('login-pass').value;
        
        if(u === 'Admin' && p === 'admin123') {
            user = { username: 'Admin', name: 'مطور النظام', role: 'developer' };
            localStorage.setItem('car_app_user', JSON.stringify(user));
            location.reload();
        } else {
            const found = usersCache.find(x => x.username === u && x.password === p);
            if(found) {
                user = found;
                localStorage.setItem('car_app_user', JSON.stringify(user));
                location.reload();
            } else {
                alert("بيانات الدخول غير صحيحة");
            }
        }
    };

    window.handleLogout = () => {
        localStorage.removeItem('car_app_user');
        location.reload();
    };

    window.shareItem = (car, driver) => {
        const text = `حركة مركبة جديدة:\nالسائق: ${driver}\nرقم السيارة: ${car}\nالتوقيت: ${getFormattedTime()}`;
        if (navigator.share) navigator.share({ text: text });
        else alert("تم نسخ البيانات");
    };
    
    window.printItem = (id) => {
        const content = document.getElementById(`content-${id}`).innerHTML;
        const win = window.open('', '', 'height=500,width=500');
        win.document.write('<html><head><title>طباعة</title></head><body dir="rtl">');
        win.document.write(content);
        win.document.write('</body></html>');
        win.document.close();
        win.print();
    };

</script>
</body>
</html>
